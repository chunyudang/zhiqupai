# Render Blueprint - 识趣派部署配置
# 文档：https://render.com/docs/blueprint-spec

services:
  - type: web
    name: shiqupai-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: >
      npm install &&
      npx prisma generate &&
      npm run build &&
      cd ../admin &&
      npm install &&
      npm run build
    startCommand: >
      npx prisma db push --accept-data-loss &&
      node dist/main
    healthCheckPath: /api/docs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: shiqupai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 30d
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_EXPIRATION
        value: 7d

databases:
  - name: shiqupai-db
    databaseName: shiqupai
    plan: free
    region: oregon
